<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0512"/>
  
  <defs>
    <!-- Cyan Glow -->
    <radialGradient id="cyan-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Fuchsia Glow -->
    <radialGradient id="fuchsia-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f355ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f355ff" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Wave Gradient -->
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#f355ff"/>
    </linearGradient>
    
    <!-- Shadow filter for premium float feel -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Ambient light backing -->
  <circle cx="200" cy="200" r="180" fill="url(#cyan-glow)"/>
  <circle cx="312" cy="312" r="180" fill="url(#fuchsia-glow)"/>

  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#wave-grad)" stroke-width="4" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#wave-grad)" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="10 15"/>

  <!-- Centered Voice Assistant Sphere & Waves -->
  <g filter="url(#shadow)">
    <!-- Main Glowing Center Orb -->
    <circle cx="256" cy="256" r="90" fill="none" stroke="url(#wave-grad)" stroke-width="6"/>
    <circle cx="256" cy="256" r="80" fill="#0c071a"/>
    
    <!-- Core Pulse -->
    <circle cx="256" cy="256" r="50" fill="url(#wave-grad)" opacity="0.15"/>
    <circle cx="256" cy="256" r="35" fill="url(#wave-grad)" opacity="0.45"/>
    <circle cx="256" cy="256" r="22" fill="#ffffff" opacity="0.95"/>
    
    <!-- Vertical and Horizontal audio visualization sparks -->
    <path d="M 256,120 L 256,150 M 256,362 L 256,392 M 120,256 L 150,256 M 362,256 L 392,256" stroke="url(#wave-grad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    
    <path d="M 160,160 L 180,180 M 332,332 L 352,352 M 160,332 L 180,312 M 332,160 L 352,180" stroke="url(#wave-grad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
